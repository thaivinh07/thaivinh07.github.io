<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP MAX Portfolio</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
    .glass { backdrop-filter: blur(15px); background: rgba(255,255,255,0.05); }
    .glow { box-shadow: 0 0 25px rgba(59,130,246,0.6); }

    /* Cursor */
    .cursor { width: 20px; height: 20px; border: 2px solid #3b82f6; border-radius: 50%; position: fixed; pointer-events: none; transform: translate(-50%, -50%); z-index: 9999; }

    /* Loading */
    #loader { position: fixed; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 99999; }
    #loader h1 { font-size: 40px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3} }

    /* Floating buttons */
    .floating { position: fixed; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9999; }
    .floating a { padding: 12px; border-radius: 50%; }
  </style>
</head>

<body class="bg-black text-white">

<!-- Loader -->
<div id="loader"><h1>VIP MAX</h1></div>

<div id="particles-js" class="fixed inset-0 -z-10"></div>
<div class="cursor" id="cursor"></div>

<!-- Floating Chat -->
<div class="floating bottom-20">
  <a href="https://zalo.me" class="bg-blue-500">Z</a>
  <a href="https://facebook.com" class="bg-blue-700">F</a>
</div>

<!-- Navbar -->
<header class="fixed w-full z-50 glass">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-2xl font-bold">VIP MAX</h1>
    <nav class="space-x-6">
      <a href="#home">Home</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<!-- Hero -->
<section id="home" class="h-screen flex items-center justify-center text-center">
  <div data-aos="fade-up">
    <h2 class="text-6xl font-extrabold mb-4">Nguyễn Thái Vinh</h2>
    <p class="text-gray-400">Web Developer • VIP Style</p>
    <br>
    <a href="#contact" class="px-8 py-3 bg-blue-500 rounded-full glow">Hire Me</a>
  </div>
</section>

<!-- Projects -->
<section id="projects" class="py-20 bg-gray-900">
  <div class="max-w-6xl mx-auto px-6">
    <h3 class="text-4xl font-bold mb-10">Projects</h3>
    <div class="grid md:grid-cols-3 gap-6">

      <div class="glass p-4 rounded-2xl hover:scale-105 transition">
        <img src="https://picsum.photos/400/250" class="rounded mb-3">
        <h4>Website bán hàng</h4>
        <a href="#" class="text-blue-400">Xem demo</a>
      </div>

      <div class="glass p-4 rounded-2xl hover:scale-105 transition">
        <img src="https://picsum.photos/401/250" class="rounded mb-3">
        <h4>Landing page</h4>
        <a href="#" class="text-blue-400">Xem demo</a>
      </div>

      <div class="glass p-4 rounded-2xl hover:scale-105 transition">
        <img src="https://picsum.photos/402/250" class="rounded mb-3">
        <h4>Automation tool</h4>
        <a href="#" class="text-blue-400">Xem demo</a>
      </div>

    </div>
  </div>
</section>

<!-- Payment QR -->
<section class="py-20 text-center">
  <h3 class="text-3xl mb-4">Thanh toán nhanh</h3>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=bank" class="mx-auto">
</section>

<!-- Contact -->
<section id="contact" class="py-20 bg-gray-900 text-center">
  <h3 class="text-4xl font-bold mb-6">Contact</h3>
  <a href="#" class="px-8 py-3 bg-green-500 rounded-full glow">Liên hệ ngay</a>
</section>

<footer class="text-center py-6 text-gray-500">© 2026 VIP MAX</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init();

  // loader
  window.onload = () => setTimeout(()=> document.getElementById('loader').style.display='none',1500);

  // cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // particles
  particlesJS('particles-js', {
    particles: { number: { value: 80 }, color: { value: '#00ffff' }, shape: { type: 'circle' }, opacity: { value: 0.5 }, size: { value: 3 }, move: { speed: 2 } }
  });
</script>

</body>
</html>
