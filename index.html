<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Vinh ❤️ Ngân</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    min-height:100vh;

    overflow-x:hidden;

    font-family:'Poppins',sans-serif;

    color:white;

    background:#0a0a0a;
}

/* ===== BACKGROUND ===== */

body::before{

    content:'';

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle at top left,#ff4fa044,transparent 35%),
    radial-gradient(circle at bottom right,#ff80bf33,transparent 35%),
    linear-gradient(135deg,#080808,#111);

    z-index:-3;
}

.bg{

    position:fixed;

    inset:0;

    overflow:hidden;

    z-index:-2;
}

.circle{

    position:absolute;

    border-radius:50%;

    filter:blur(90px);

    animation:move 12s infinite alternate ease-in-out;
}

.circle1{
    width:320px;
    height:320px;
    background:#ff4fa0;
    top:-80px;
    left:-80px;
}

.circle2{
    width:380px;
    height:380px;
    background:#ff80bf;
    bottom:-100px;
    right:-100px;
}

.circle3{
    width:260px;
    height:260px;
    background:#ffc1dc;
    top:40%;
    left:45%;
}

@keyframes move{

    from{
        transform:translate(0,0);
    }

    to{
        transform:translate(40px,30px);
    }
}

/* ===== MAIN ===== */

.wrapper{

    width:min(92%,1100px);

    margin:auto;

    padding:40px 0;
}

.container{

    margin-top:30px;

    padding:clamp(20px,4vw,55px);

    border-radius:35px;

    background:rgba(255,255,255,.06);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 0 30px rgba(255,105,180,.15),
    0 0 60px rgba(255,182,217,.08);

    text-align:center;
}

/* ===== TITLE ===== */

.small{

    letter-spacing:6px;

    font-size:12px;

    opacity:.75;
}

h1{

    font-family:'Great Vibes',cursive;

    font-size:clamp(55px,8vw,100px);

    margin-top:10px;

    line-height:1.1;

    background:linear-gradient(
    90deg,
    #ff4fa0,
    #ffd1e8,
    #ffffff
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}

.subtitle{

    margin-top:15px;

    font-size:clamp(15px,2vw,20px);

    opacity:.85;
}

/* ===== COUPLE ===== */

.couple{

    margin-top:35px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

    gap:20px;
}

.person{

    padding:28px;

    border-radius:28px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    transition:.4s;
}

.person:hover{

    transform:translateY(-8px);

    box-shadow:
    0 0 25px rgba(255,105,180,.18);
}

.person h2{

    color:#ffd1e8;

    font-size:clamp(22px,3vw,30px);
}

.person p{

    margin-top:10px;

    opacity:.8;

    font-size:15px;
}

/* ===== TIMER ===== */

.timer{

    margin-top:35px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(140px,1fr));

    gap:20px;
}

.box{

    position:relative;

    overflow:hidden;

    padding:30px 15px;

    border-radius:28px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    transition:.4s;
}

.box::before{

    content:'';

    position:absolute;

    inset:-2px;

    background:
    linear-gradient(
    45deg,
    #ff4fa0,
    #ff80bf,
    #ffd1e8,
    #ff4fa0
    );

    background-size:300%;

    filter:blur(20px);

    opacity:.5;

    z-index:-1;

    animation:borderMove 7s linear infinite;
}

@keyframes borderMove{

    0%{
        background-position:0 0;
    }

    100%{
        background-position:300% 0;
    }
}

.box:hover{

    transform:
    translateY(-10px)
    scale(1.03);

    box-shadow:
    0 0 25px rgba(255,105,180,.25);
}

.number{

    font-size:clamp(38px,5vw,60px);

    font-weight:700;

    color:#ffd1e8;
}

.label{

    margin-top:10px;

    letter-spacing:2px;

    opacity:.7;

    font-size:14px;
}

/* ===== BIRTHDAY ===== */

.birthday{

    margin-top:35px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

    gap:20px;
}

.birthday-card{

    padding:28px;

    border-radius:28px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);
}

.birthday-card h3{

    color:#ffd1e8;

    font-size:18px;
}

.count{

    margin-top:15px;

    font-size:clamp(28px,4vw,38px);

    font-weight:700;
}

/* ===== MESSAGE ===== */

.message-box{

    margin-top:35px;

    padding:30px;

    border-radius:30px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);
}

.message-title{

    font-size:16px;

    letter-spacing:3px;

    color:#ffd1e8;
}

#loveMessage{

    margin-top:20px;

    font-size:clamp(17px,2vw,24px);

    line-height:1.8;

    color:#ffe6f2;

    min-height:90px;

    transition:.4s;
}

/* ===== HEART ===== */

.heart{

    position:fixed;

    color:#ff80bf;

    pointer-events:none;

    animation:float linear forwards;

    text-shadow:
    0 0 15px #ff4fa0;
}

@keyframes float{

    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }

    100%{
        transform:translateY(-110vh) scale(2);
        opacity:0;
    }
}

/* ===== MOBILE ===== */

@media(max-width:768px){

    .container{
        border-radius:25px;
    }

    .message-box{
        padding:22px;
    }

    #loveMessage{
        min-height:120px;
    }
}

</style>

</head>

<body>

<div class="bg">

    <div class="circle circle1"></div>

    <div class="circle circle2"></div>

    <div class="circle circle3"></div>

</div>

<div class="wrapper">

<div class="container">

    <div class="small">
        FOREVER LOVE
    </div>

    <h1>
        Vinh ❤️ Ngân
    </h1>

    <div class="subtitle">
        Chúng ta đã bên nhau từ 12/11/2024 💖
    </div>

    <!-- COUPLE -->

    <div class="couple">

        <div class="person">

            <h2>
                👑 Nguyễn Thái Vinh
            </h2>

            <p>
                🎂 Sinh ngày 25/06/2007
            </p>

        </div>

        <div class="person">

            <h2>
                💖 Đỗ Trần Bảo Ngân
            </h2>

            <p>
                🎂 Sinh ngày 08/11/2007
            </p>

        </div>

    </div>

    <!-- TIMER -->

    <div class="timer">

        <div class="box">
            <div class="number" id="days">0</div>
            <div class="label">NGÀY</div>
        </div>

        <div class="box">
            <div class="number" id="hours">0</div>
            <div class="label">GIỜ</div>
        </div>

        <div class="box">
            <div class="number" id="minutes">0</div>
            <div class="label">PHÚT</div>
        </div>

        <div class="box">
            <div class="number" id="seconds">0</div>
            <div class="label">GIÂY</div>
        </div>

    </div>

    <!-- BIRTHDAY -->

    <div class="birthday">

        <div class="birthday-card">

            <h3>
                🎉 Sinh nhật của Vinh còn
            </h3>

            <div class="count" id="vinhBirthday">
                0 ngày
            </div>

        </div>

        <div class="birthday-card">

            <h3>
                🎀 Sinh nhật của Ngân còn
            </h3>

            <div class="count" id="nganBirthday">
                0 ngày
            </div>

        </div>

    </div>

    <!-- LOVE MESSAGE -->

    <div class="message-box">

        <div class="message-title">
            💌 LỜI YÊU DÀNH CHO BẢO NGÂN 💌
        </div>

        <div id="loveMessage"></div>

    </div>

</div>

</div>

<script>

/* ===== LOVE TIMER ===== */

const startDate =
new Date('2024-11-12T00:00:00');

function updateLove(){

    const now = new Date();

    const diff = now - startDate;

    document.getElementById('days').innerHTML =
    Math.floor(diff/(1000*60*60*24));

    document.getElementById('hours').innerHTML =
    Math.floor((diff/(1000*60*60))%24);

    document.getElementById('minutes').innerHTML =
    Math.floor((diff/(1000*60))%60);

    document.getElementById('seconds').innerHTML =
    Math.floor((diff/1000)%60);
}

setInterval(updateLove,1000);

updateLove();

/* ===== BIRTHDAY ===== */

function birthdayCountdown(month,day,id){

    const now = new Date();

    let nextBirthday =
    new Date(now.getFullYear(),month-1,day);

    if(nextBirthday < now){

        nextBirthday.setFullYear(
        now.getFullYear()+1
        );
    }

    const diff = nextBirthday - now;

    const days =
    Math.ceil(diff/(1000*60*60*24));

    document.getElementById(id).innerHTML =
    days + ' ngày';
}

function updateBirthdays(){

    birthdayCountdown(6,25,'vinhBirthday');

    birthdayCountdown(11,8,'nganBirthday');
}

updateBirthdays();

/* ===== LOVE MESSAGES ===== */

const messages = [

'Bảo Ngân biết không... điều tuyệt vời nhất anh có được chính là em ❤️',

'Anh không cần cả thế giới, anh chỉ cần một mình Bảo Ngân thôi 💖',

'Mỗi lần em cười là tim anh lại lỡ thêm một nhịp ✨',

'Em giống như ánh mặt trời vậy... làm ngày nào của anh cũng đẹp hơn ☀️',

'Có em rồi anh chẳng cần thích ai nữa 🥰',

'Anh không giỏi nói lời ngọt ngào... nhưng anh sẽ thương em thật lâu 💞',

'Nếu được chọn lại lần nữa, anh vẫn sẽ chọn gặp em 💘',

'Em là lý do khiến điện thoại anh luôn đầy pin vì cứ muốn nhắn cho em mãi 📱❤️',

'Bảo Ngân đáng yêu quá nên anh nghiện mất rồi 😳',

'Thế giới ngoài kia có thể mệt... nhưng chỉ cần thấy em là anh vui 💖',

'Anh thích mọi thứ thuộc về em, kể cả những điều nhỏ nhặt nhất 🌸',

'Em không cần hoàn hảo, vì trong mắt anh em đã là điều đẹp nhất rồi ✨',

'Điều anh mong nhất mỗi ngày là được nói chuyện với em 💌',

'Anh không hứa cho em cả thế giới, nhưng anh hứa sẽ dành cả thế giới của anh cho em ❤️',

'Có những ngày rất bình thường... nhưng vì có em nên trở nên đặc biệt 💞',

'Bảo Ngân là ngoại lệ duy nhất của anh 💘',

'Anh thích cảm giác được em quan tâm dù chỉ là một chút 🥺',

'Em là người đầu tiên khiến anh muốn nghiêm túc lâu dài 💍',

'Tim anh giờ full bộ nhớ vì toàn lưu hình bóng em 😭💖',

'Chắc em mệt lắm đúng không? Vì chạy trong đầu anh cả ngày rồi 🥰'

];

let index = 0;

function changeMessage(){

    const messageElement =
    document.getElementById('loveMessage');

    messageElement.style.opacity = '0';

    setTimeout(()=>{

        messageElement.innerHTML =
        '“' + messages[index] + '”';

        messageElement.style.opacity = '1';

        index++;

        if(index >= messages.length){

            index = 0;
        }

    },400);
}

changeMessage();

setInterval(changeMessage,5000);

/* ===== HEART EFFECT ===== */

function createHeart(){

    const heart =
    document.createElement('div');

    heart.className = 'heart';

    heart.innerHTML = '❤';

    heart.style.left =
    Math.random()*window.innerWidth + 'px';

    heart.style.bottom = '-20px';

    heart.style.fontSize =
    Math.random()*18 + 16 + 'px';

    heart.style.animationDuration =
    Math.random()*3 + 4 + 's';

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },7000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
