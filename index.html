<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Vinh ❤️ Ngân</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:#0b0b0b;
    color:white;
}

/* BACKGROUND */

body::before{
    content:'';
    position:fixed;
    inset:0;

    background:
    radial-gradient(circle at top left,#ff4fa055,transparent 35%),
    radial-gradient(circle at bottom right,#ff80bf44,transparent 35%),
    linear-gradient(135deg,#090909,#111);

    z-index:-3;
}

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-2;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    animation:move 10s infinite alternate ease-in-out;
}

.circle1{
    width:350px;
    height:350px;
    background:#ff4fa0;
    top:-50px;
    left:-50px;
}

.circle2{
    width:400px;
    height:400px;
    background:#ff80bf;
    bottom:-120px;
    right:-80px;
}

.circle3{
    width:300px;
    height:300px;
    background:#ffb6d9;
    top:40%;
    left:45%;
}

@keyframes move{

    from{
        transform:translateY(0) translateX(0);
    }

    to{
        transform:translateY(30px) translateX(40px);
    }
}

/* MAIN CARD */

.container{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:92%;
    max-width:1100px;

    padding:50px 35px;

    border-radius:40px;

    background:rgba(255,255,255,.06);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
    0 0 40px rgba(255,105,180,.25),
    0 0 80px rgba(255,182,217,.15);

    text-align:center;
}

/* TITLE */

.small{
    letter-spacing:6px;
    font-size:12px;
    opacity:.7;
}

h1{

    font-family:'Great Vibes',cursive;

    font-size:95px;

    margin-top:10px;

    background:linear-gradient(
    90deg,
    #ff4fa0,
    #ffc1dc,
    #fff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    margin-top:10px;
    font-size:18px;
    opacity:.85;
}

/* COUPLE */

.couple{

    margin-top:35px;

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;
}

.person{

    padding:28px;

    border-radius:28px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);
}

.person h2{
    color:#ffc1dc;
    font-size:28px;
}

.person p{
    margin-top:10px;
    opacity:.8;
}

/* TIMER */

.timer{

    margin-top:35px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:20px;
}

.box{

    padding:35px 20px;

    border-radius:28px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    position:relative;

    overflow:hidden;

    transition:.4s;
}

.box::before{

    content:'';

    position:absolute;

    inset:-2px;

    background:linear-gradient(
    45deg,
    #ff4fa0,
    #ff80bf,
    #ffd1e8,
    #ff4fa0
    );

    background-size:300%;

    filter:blur(20px);

    opacity:.5;

    z-index:-1;

    animation:borderMove 6s linear infinite;
}

@keyframes borderMove{

    0%{
        background-position:0 0;
    }

    100%{
        background-position:300% 0;
    }
}

.box:hover{

    transform:translateY(-10px);

    box-shadow:
    0 0 25px rgba(255,105,180,.35);
}

.number{
    font-size:58px;
    font-weight:700;
    color:#ffd1e8;
}

.label{
    margin-top:10px;
    letter-spacing:2px;
    opacity:.7;
}

/* BIRTHDAY */

.birthday{

    margin-top:35px;

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;
}

.birthday-card{

    padding:28px;

    border-radius:28px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);
}

.birthday-card h3{
    color:#ffc1dc;
    font-size:18px;
}

.count{
    margin-top:15px;
    font-size:34px;
    font-weight:700;
}

/* MESSAGE */

.message-box{

    margin-top:35px;

    padding:35px;

    border-radius:30px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);
}

.message-title{

    font-size:18px;

    letter-spacing:3px;

    color:#ffc1dc;
}

#loveMessage{

    margin-top:20px;

    font-size:24px;

    line-height:1.8;

    color:#ffe6f2;

    min-height:90px;

    transition:.4s;
}

/* HEART */

.heart{

    position:fixed;

    color:#ff80bf;

    pointer-events:none;

    animation:float linear forwards;

    text-shadow:0 0 15px #ff4fa0;
}

@keyframes float{

    0%{
        transform:translateY(0) scale(1);
        opacity:1;
    }

    100%{
        transform:translateY(-110vh) scale(2);
        opacity:0;
    }
}

/* MOBILE */

@media(max-width:768px){

    h1{
        font-size:60px;
    }

    .couple,
    .birthday{
        grid-template-columns:1fr;
    }

    .timer{
        grid-template-columns:repeat(2,1fr);
    }

    .container{
        padding:35px 20px;
    }

    .number{
        font-size:42px;
    }

    #loveMessage{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="bg">

    <div class="circle circle1"></div>

    <div class="circle circle2"></div>

    <div class="circle circle3"></div>

</div>

<div class="container">

    <div class="small">
        FOREVER LOVE
    </div>

    <h1>
        Vinh ❤️ Ngân
    </h1>

    <div class="subtitle">
        Chúng ta đã bên nhau từ 12/11/2024 💖
    </div>

    <!-- COUPLE -->

    <div class="couple">

        <div class="person">
            <h2>👑 Nguyễn Thái Vinh</h2>
            <p>🎂 Sinh ngày 25/06/2007</p>
        </div>

        <div class="person">
            <h2>💖 Đỗ Trần Bảo Ngân</h2>
            <p>🎂 Sinh ngày 08/11/2007</p>
        </div>

    </div>

    <!-- LOVE TIMER -->

    <div class="timer">

        <div class="box">
            <div class="number" id="days">0</div>
            <div class="label">NGÀY</div>
        </div>

        <div class="box">
            <div class="number" id="hours">0</div>
            <div class="label">GIỜ</div>
        </div>

        <div class="box">
            <div class="number" id="minutes">0</div>
            <div class="label">PHÚT</div>
        </div>

        <div class="box">
            <div class="number" id="seconds">0</div>
            <div class="label">GIÂY</div>
        </div>

    </div>

    <!-- BIRTHDAY -->

    <div class="birthday">

        <div class="birthday-card">

            <h3>
                🎉 Còn bao lâu tới sinh nhật Vinh
            </h3>

            <div class="count" id="vinhBirthday"></div>

        </div>

        <div class="birthday-card">

            <h3>
                🎀 Còn bao lâu tới sinh nhật Ngân
            </h3>

            <div class="count" id="nganBirthday"></div>

        </div>

    </div>

    <!-- LOVE MESSAGE -->

    <div class="message-box">

        <div class="message-title">
            💌 LỜI YÊU DÀNH CHO BẢO NGÂN 💌
        </div>

        <div id="loveMessage"></div>

    </div>

</div>

<script>

/* LOVE TIMER */

const startDate =
new Date('2024-11-12T00:00:00');

function updateLove(){

    const now = new Date();

    const diff = now - startDate;

    document.getElementById('days').innerHTML =
    Math.floor(diff/(1000*60*60*24));

    document.getElementById('hours').innerHTML =
    Math.floor((diff/(1000*60*60))%24);

    document.getElementById('minutes').innerHTML =
    Math.floor((diff/(1000*60))%60);

    document.getElementById('seconds').innerHTML =
    Math.floor((diff/1000)%60);
}

setInterval(updateLove,1000);

updateLove();

/* BIRTHDAY */

function birthdayCountdown(month,day,id){

    const now = new Date();

    let next =
    new Date(now.getFullYear(),month-1,day);

    if(next < now){

        next.setFullYear(
        now.getFullYear()+1
        );
    }

    const diff = next - now;

    const days =
    Math.ceil(diff/(1000*60*60*24));

    document.getElementById(id).innerHTML =
    days + ' ngày';
}

function updateBirthdays(){

    birthdayCountdown(
    6,
    25,
    'vinhBirthday'
    );

    birthdayCountdown(
    11,
    8,
    'nganBirthday'
    );
}

updateBirthdays();

/* LOVE MESSAGES */

const messages = [

'Bảo Ngân biết không... điều tuyệt vời nhất anh có được chính là em ❤️',

'Anh không cần cả thế giới, anh chỉ cần một mình Bảo Ngân thôi 💖',

'Mỗi lần em cười là tim anh lại lỡ thêm một nhịp ✨',

'Em giống như ánh mặt trời vậy... làm ngày nào của anh cũng đẹp hơn ☀️',

'Có em rồi anh chẳng cần thích ai nữa 🥰',

'Anh không giỏi nói lời ngọt ngào... nhưng anh sẽ thương em thật lâu 💞',

'Nếu được chọn lại lần nữa, anh vẫn sẽ chọn gặp em 💘',

'Em là lý do khiến điện thoại anh luôn đầy pin vì cứ muốn nhắn cho em mãi 📱❤️',

'Bảo Ngân đáng yêu quá nên anh nghiện mất rồi 😳',

'Thế giới ngoài kia có thể mệt... nhưng chỉ cần thấy em là anh vui 💖',

'Anh thích mọi thứ thuộc về em, kể cả những điều nhỏ nhặt nhất 🌸',

'Em không cần hoàn hảo, vì trong mắt anh em đã là điều đẹp nhất rồi ✨',

'Điều anh mong nhất mỗi ngày là được nói chuyện với em 💌',

'Anh không hứa cho em cả thế giới, nhưng anh hứa sẽ dành cả thế giới của anh cho em ❤️',

'Có những ngày rất bình thường... nhưng vì có em nên trở nên đặc biệt 💞',

'Bảo Ngân là ngoại lệ duy nhất của anh 💘',

'Anh thích cảm giác được em quan tâm dù chỉ là một chút 🥺',

'Em là người đầu tiên khiến anh muốn nghiêm túc lâu dài 💍',

'Tim anh giờ full bộ nhớ vì toàn lưu hình bóng em 😭💖',

'Chắc em mệt lắm đúng không? Vì chạy trong đầu anh cả ngày rồi 🥰'

];

let index = 0;

function changeMessage(){

    const messageElement =
    document.getElementById('loveMessage');

    messageElement.style.opacity = '0';

    setTimeout(()=>{

        messageElement.innerHTML =
        '“' + messages[index] + '”';

        messageElement.style.opacity = '1';

        index++;

        if(index >= messages.length){

            index = 0;
        }

    },400);
}

changeMessage();

setInterval(changeMessage,5000);

/* HEART EFFECT */

function createHeart(){

    const heart =
    document.createElement('div');

    heart.className = 'heart';

    heart.innerHTML = '❤';

    heart.style.left =
    Math.random()*window.innerWidth + 'px';

    heart.style.bottom = '-20px';

    heart.style.fontSize =
    Math.random()*20 + 18 + 'px';

    heart.style.animationDuration =
    Math.random()*4 + 4 + 's';

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },7000);
}

setInterval(createHeart,250);

</script>

</body>
</html>
